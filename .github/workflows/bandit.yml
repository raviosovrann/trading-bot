# Bandit static security analysis for Python. Runs as a BLOCKING gate: a
# medium+/medium+ finding fails the build (no exit_zero). Suppress a specific
# false positive inline with `# nosec <test-id>  # rationale`, never globally.
name: Bandit

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    - cron: "29 20 * * 3"

permissions:
  contents: read

concurrency:
  group: bandit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit (pinned)
        run: pip install "bandit[toml]==1.9.4"
      - name: Run bandit (blocking, medium severity + confidence)
        # -ll = report medium+ severity, -ii = medium+ confidence. Config
        # (exclude_dirs) comes from pyproject.toml [tool.bandit].
        run: bandit -c pyproject.toml -r src/tradingbot -ll -ii
