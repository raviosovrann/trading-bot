name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies (pinned via constraints.txt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
      - name: Run tests with branch coverage
        run: |
          pytest -v \
            --cov=tradingbot --cov-branch \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=85 \
            --junitxml=test-results-${{ matrix.python-version }}.xml
      - name: Upload test & coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            test-results-${{ matrix.python-version }}.xml
          if-no-files-found: ignore
