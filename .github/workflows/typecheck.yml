name: Type Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: typecheck-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies (pinned via constraints.txt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints.txt
      - name: Run pyright
        run: pyright src/tradingbot tests
